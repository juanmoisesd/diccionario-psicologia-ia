name: Deploy Jekyll Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate term pages from JSONL
        run: |
          mkdir -p _terminos
          python3 << 'PYEOF'
          import json, re, os
          def slugify(t):
              s = t.lower().strip()
              s = re.sub(r"[^a-z0-9\u00e1\u00e9\u00ed\u00f3\u00fa\u00fc\u00f1]+", "-", s)
              return s.strip("-")
          with open("data/terms.jsonl", "r", encoding="utf-8") as f:
              for line in f:
                  d = json.loads(line)
                  slug = slugify(d["termino"])
                  out_lines = []
                  out_lines.append("---")
                  out_lines.append("layout: term")
                  keys = ["termino","term_id","area","definicion_corta","definicion_tecnica","ejemplo","no_confundir_con","relaciones","nivel_confianza","fuentes","version","fecha_revision"]
                  for key in keys:
                      val = str(d.get(key, ""))
                      val = val.replace('"', '\\"')
                      if key == "termino":
                          out_lines.append('title: "' + val + '"')
                      out_lines.append(key + ': "' + val + '"')
                  out_lines.append("---")
                  fpath = os.path.join("_terminos", slug + ".md")
                  with open(fpath, "w", encoding="utf-8") as out:
                      out.write('\n'.join(out_lines) + '\n')
          print("Generated term pages")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

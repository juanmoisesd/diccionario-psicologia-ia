# Jekyll Configuration - Diccionario de Psicología Wiki
title: "Diccionario de Psicología en Español"
description: "Diccionario estructurado de psicología en español para IA y LLMs — 3,002 términos"
baseurl: "/diccionario-psicologia-ia"
url: "https://juanmoisesd.github.io"
repository: "juanmoisesd/diccionario-psicologia-ia"

# Author
author:
  name: "Dr. Juan Moisés de la Serna"
  orcid: "0000-0002-8401-8018"
  institution: "UNIR"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Collections
collections:
  terminos:
    output: true
    permalink: /termino/:slug/
    sort_by: title

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Defaults
defaults:
  - scope:
      path: ""
      type: "terminos"
    values:
      layout: "term"

# Exclude from build
exclude:
  - node_modules
  - Gemfile.lock
  - .bundle
  - .git
  - scripts
  - governance
  - references
  - "*.py"
  - "*.sh"

# Include data directory
include:
  - _terminos

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diccionario de Psicología en Español para IA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f6f8fa;color:#24292f}
header{background:#0d1117;color:#fff;padding:2rem 1rem;text-align:center}
header h1{font-size:1.8rem;margin-bottom:.5rem}
header p{color:#8b949e;font-size:.95rem}
.badges{margin-top:.8rem;display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.badge{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:.2rem .6rem;font-size:.8rem;color:#58a6ff;text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
.search-box{display:flex;gap:.5rem;margin-bottom:1rem}
#searchInput{flex:1;padding:.6rem 1rem;border:1px solid #d0d7de;border-radius:6px;font-size:1rem;outline:none}
#searchInput:focus{border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.1)}
#areaFilter{padding:.6rem .8rem;border:1px solid #d0d7de;border-radius:6px;font-size:.9rem;background:#fff}
.stats{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:1rem;margin-bottom:1rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:1.5rem;font-weight:700;color:#0969da}
.stat-label{font-size:.8rem;color:#57606a}
#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem}
.card{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#0969da;box-shadow:0 1px 5px rgba(0,0,0,.1)}
.card h3{font-size:1rem;color:#0969da;margin-bottom:.3rem}
.card .area-tag{display:inline-block;background:#ddf4ff;color:#0550ae;border-radius:4px;padding:.1rem .4rem;font-size:.75rem;margin-bottom:.4rem}
.card p{font-size:.85rem;color:#57606a;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{margin-top:.5rem;font-size:.75rem;color:#8c959f}
#count{color:#57606a;font-size:.9rem;margin-bottom:.6rem}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto}
.modal-overlay.active{display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.modal{background:#fff;border-radius:8px;max-width:700px;width:100%;padding:2rem;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#57606a}
.modal h2{font-size:1.4rem;color:#0d1117;margin-bottom:.5rem}
.modal .badges-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.modal .tag{padding:.2rem .6rem;border-radius:4px;font-size:.8rem}
.tag-area{background:#ddf4ff;color:#0550ae}
.tag-conf{background:#d2f4ea;color:#1a7f37}
.modal section{margin-bottom:1rem}
.modal section h4{font-size:.85rem;text-transform:uppercase;color:#57606a;margin-bottom:.3rem;letter-spacing:.05em}
.modal section p,.modal section ul{font-size:.95rem;line-height:1.6}
.modal section ul{padding-left:1.2rem}
.modal .id-badge{font-size:.8rem;color:#8c959f;font-family:monospace}
.no-results{text-align:center;padding:3rem;color:#57606a;grid-column:1/-1}
mark{background:#fff3b8;padding:0 1px;border-radius:2px}
</style>
</head>
<body>
<header>
  <h1>&#x1F4D6; Diccionario de Psicología en Español para IA</h1>
  <p>Dataset léxico-conceptual &middot; Dr. Juan Moisés de la Serna (UNIR) &middot; CC BY 4.0</p>
  <div class="badges">
    <a class="badge" href="https://doi.org/10.5281/zenodo.19297225">DOI 10.5281/zenodo.19297225</a>
    <a class="badge" href="https://github.com/juanmoisesd/diccionario-psicologia-ia">GitHub</a>
    <a class="badge" href="https://huggingface.co/datasets/juanmoisesdelas/diccionario-psicologia-es">HuggingFace</a>
  </div>
</header>
<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalTerms">...</div><div class="stat-label">Términos únicos</div></div>
    <div class="stat"><div class="stat-num">18</div><div class="stat-label">Áreas temáticas</div></div>
    <div class="stat"><div class="stat-num">12</div><div class="stat-label">Campos por término</div></div>
    <div class="stat"><div class="stat-num">v2.0.0</div><div class="stat-label">Versión actual</div></div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar término... (ej: ansiedad, depresión...)" autocomplete="off">
    <select id="areaFilter"><option value="">Todas las áreas</option></select>
  </div>
  <div id="count"></div>
  <div id="results"><div class="no-results">Cargando términos...</div></div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>
<script>
var allTerms=[];
var DATA_URL="https://raw.githubusercontent.com/juanmoisesd/diccionario-psicologia-ia/main/data/terms.jsonl";
function loadData(){
  fetch(DATA_URL)
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
    .then(function(text){
      allTerms=text.trim().split("\n").filter(function(l){return l.trim();}).map(function(l){try{return JSON.parse(l);}catch(e){return null;}}).filter(Boolean);
      document.getElementById("totalTerms").textContent=allTerms.length;
      populateAreas();
      renderResults(allTerms);
    })
    .catch(function(e){
      document.getElementById("results").innerHTML='<div class="no-results">Error cargando datos: '+e.message+'</div>';
    });
}
function populateAreas(){
  var areas=[],seen={};
  allTerms.forEach(function(t){if(t.area&&!seen[t.area]){seen[t.area]=1;areas.push(t.area);}});
  areas.sort();
  var sel=document.getElementById("areaFilter");
  areas.forEach(function(a){var o=document.createElement("option");o.value=a;o.textContent=a;sel.appendChild(o);});
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hi(text,q){
  if(!q||!text)return esc(text);
  var safe=q.replace(/[.*+?^${}()|[\\]\\\\]/g,"\\\\$&");
  var re=new RegExp("("+safe+")","gi");
  return esc(text).replace(re,"<mark>$1</mark>");
}
function renderResults(terms){
  var q=document.getElementById("searchInput").value.trim().toLowerCase();
  var c=document.getElementById("results");
  document.getElementById("count").textContent=terms.length+" t\u00e9rminos encontrados";
  if(!terms.length){c.innerHTML='<div class="no-results">No se encontraron t\u00e9rminos.</div>';return;}
  c.innerHTML=terms.map(function(t){
    return '<div class="card" data-id="'+esc(t.term_id)+'">'
      +'<div class="area-tag">'+esc(t.area)+'</div>'
      +'<h3>'+hi(t.termino,q)+'</h3>'
      +'<p>'+hi(t.definicion_corta,q)+'</p>'
      +'<div class="meta">'+esc(t.term_id)+' &middot; Confianza: '+esc(t.nivel_confianza)+'</div>'
      +'</div>';
  }).join("");
  c.querySelectorAll(".card").forEach(function(card){
    card.addEventListener("click",function(){
      var term=allTerms.find(function(t){return t.term_id===card.dataset.id;});
      if(term)showModal(term);
    });
  });
}
function search(){
  var q=document.getElementById("searchInput").value.trim().toLowerCase();
  var area=document.getElementById("areaFilter").value;
  var f=allTerms;
  if(area)f=f.filter(function(t){return t.area===area;});
  if(q)f=f.filter(function(t){
    return (t.termino||"").toLowerCase().indexOf(q)>-1||(t.definicion_corta||"").toLowerCase().indexOf(q)>-1||(t.area||"").toLowerCase().indexOf(q)>-1;
  });
  renderResults(f);
}
function listItems(arr){if(!arr||!arr.length)return "<p>\u2014</p>";return "<ul>"+arr.map(function(x){return "<li>"+esc(x)+"</li>";}).join("")+"</ul>";}
function showModal(t){
  var nc=Array.isArray(t.no_confundir_con)?t.no_confundir_con:(t.no_confundir_con?[t.no_confundir_con]:[]);
  var rel=Array.isArray(t.relaciones)?t.relaciones:[];
  var ft=Array.isArray(t.fuentes)?t.fuentes:[];
  document.getElementById("modalContent").innerHTML=
    '<span class="id-badge">'+esc(t.term_id)+'</span>'
    +'<h2>'+esc(t.termino)+'</h2>'
    +'<div class="badges-row"><span class="tag tag-area">'+esc(t.area)+'</span><span class="tag tag-conf">Confianza: '+esc(t.nivel_confianza)+'</span></div>'
    +'<section><h4>Definici\u00f3n breve</h4><p>'+esc(t.definicion_corta||"\u2014")+'</p></section>'
    +'<section><h4>Definici\u00f3n t\u00e9cnica</h4><p>'+esc(t.definicion_tecnica||"\u2014")+'</p></section>'
    +(t.ejemplo?'<section><h4>Ejemplo</h4><p>'+esc(t.ejemplo)+'</p></section>':"")  
    +(nc.length?'<section><h4>No confundir con</h4>'+listItems(nc)+'</section>':"")  
    +(rel.length?'<section><h4>T\u00e9rminos relacionados</h4>'+listItems(rel)+'</section>':"")  
    +(ft.length?'<section><h4>Fuentes</h4>'+listItems(ft)+'</section>':"")  
    +'<section><h4>\u00daltima revisi\u00f3n</h4><p>'+esc(t.fecha_revision||"\u2014")+'</p></section>';
  document.getElementById("modalOverlay").classList.add("active");
  document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("active");document.body.style.overflow="";}
document.getElementById("modalClose").addEventListener("click",closeModal);
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===e.currentTarget)closeModal();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
var dbt;
document.getElementById("searchInput").addEventListener("input",function(){clearTimeout(dbt);dbt=setTimeout(search,200);});
document.getElementById("areaFilter").addEventListener("change",search);
loadData();
</script>
</body>
</html>
